name: Desplegar Laravel en Azure App Service

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, curl, mongodb, bcmath, fileinfo, openssl, tokenizer, ctype
          tools: composer:v2

      - name: Instalar dependencias de Composer
        run: composer update --no-dev --optimize-autoloader --no-interaction --prefer-dist --ignore-platform-reqs --no-audit

      - name: Preparar .env
        run: cp .env.example .env

      - name: Comprimir artefacto
        run: zip -r app.zip . -x '*.git*'

      - name: Desplegar en Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'reservas-canchas'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app.zip